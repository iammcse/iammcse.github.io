<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="UTF-8">
<style>
  /* --- Material 3 Design Tokens --- */
  :root {
    --bg: #fef7ff;
    --surface: #ffffff;
    --surface-variant: #f0efed;
    --primary: #0b57d0;
    --on-primary: #ffffff;
    --primary-container: #d3e3fd;
    --on-primary-container: #041e49;
    --text: #1f1f1f;
    --text-secondary: #444746;
    --border: #c4c7c5;
    --error: #b3261e;
    --error-container: #f9dedc;
    --success: #146c2e;
    --shadow: 0 1px 2px rgba(0,0,0,0.08);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-pill: 20px;
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 12px;
    --transition: 150ms ease;
  }

  [data-theme="dark"] {
    --bg: #1a1c1e;
    --surface: #282a2d;
    --surface-variant: #35383b;
    --primary: #a8c7fa;
    --on-primary: #062e6f;
    --primary-container: #0842a0;
    --on-primary-container: #d3e3fd;
    --text: #e3e3e3;
    --text-secondary: #b9bbbe;
    --border: #44464a;
    --error: #f2b8b5;
    --error-container: #8c1d18;
    --success: #a8dab5;
    --shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  /* --- Reset & Base --- */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 360px;
    padding: var(--space-md);
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    transition: background var(--transition), color var(--transition);
  }

  /* --- Header --- */
  .popup-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-md);
    gap: var(--space-sm);
  }

  .popup-header h2 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--primary);
    letter-spacing: -0.01em;
  }

  #theme-toggle {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 0.95rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background var(--transition);
    flex-shrink: 0;
  }
  #theme-toggle:hover { background: var(--surface-variant); }

  /* --- Info Rows --- */
  .info {
    padding: 8px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border-radius: var(--radius-sm);
    margin-bottom: var(--space-xs);
    border: 1px solid var(--border);
  }

  .info-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .info-value {
    font-weight: 500;
    font-size: 12px;
  }

  .info-value em { color: var(--text-secondary); font-weight: 400; }

  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: var(--space-md) 0;
  }

  .section-title {
    font-weight: 600;
    font-size: 10px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: var(--space-sm);
  }

  /* --- Extension Items --- */
  .ext-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: var(--space-xs);
  }

  .ext-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 12px;
  }

  .ext-status {
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
    margin-left: var(--space-sm);
    padding: 2px 10px;
    border-radius: var(--radius-pill);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .status-enabled  { color: var(--success); background: var(--success-container, #cce8d4); }
  .status-disabled { color: var(--error); background: var(--error-container); }
  .status-missing  { color: var(--text-secondary); background: var(--surface-variant); }

  [data-theme="dark"] .status-enabled  { background: var(--primary-container); color: var(--primary); }
  [data-theme="dark"] .status-disabled { --error: #f2b8b5; }
  [data-theme="dark"] .status-missing  { }

  .empty {
    text-align: center;
    color: var(--text-secondary);
    padding: var(--space-md) 0;
    font-style: italic;
    font-size: 12px;
  }

  .error {
    color: var(--error);
    padding: var(--space-sm);
    background: var(--error-container);
    border-radius: var(--radius-sm);
    font-size: 12px;
  }

  /* --- Buttons --- */
  .actions {
    display: flex;
    gap: var(--space-sm);
    margin-top: var(--space-md);
  }

  button {
    flex: 1;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    background: var(--surface);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    color: var(--text);
    transition: background var(--transition), box-shadow var(--transition);
    height: 36px;
    white-space: nowrap;
  }

  button:hover { background: var(--surface-variant); }

  button.primary {
    background: var(--primary);
    color: var(--on-primary);
    border-color: var(--primary);
  }
  button.primary:hover { box-shadow: var(--shadow); filter: brightness(1.05); }

  .loading { text-align: center; color: var(--text-secondary); padding: var(--space-md) 0; font-size: 12px; }
</style>
</head>
<body>
  <div class="popup-header">
    <h2>KSC hub</h2>
    <button type="button" id="theme-toggle" title="Toggle theme">☀️</button>
  </div>
  <div id="content"><div class="loading">Loading&hellip;</div></div>
  <div class="actions">
    <button id="btn-options">Options</button>
    <button id="btn-refresh">Refresh</button>
    <button id="btn-apply" class="primary">Apply Now</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
